name: CI

# Pipeline: frontend + backend unit tests run in parallel, then backend
# integration tests, then deploy. Deploy only runs on pushes to main.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # --- Stage 1: unit tests (frontend and backend run in parallel) ---------
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests

  # --- Stage 2: integration tests (after the unit suites pass) ------------
  # tests_integration/conftest.py points DATABASE_URL at a throwaway SQLite
  # file at import time and asserts the backend is SQLite, so this job must
  # NOT set DATABASE_URL and needs no Postgres service.
  backend-integration:
    name: Backend integration tests
    needs: [frontend-tests, backend-tests]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests_integration

  # --- Stage 3: deploy (only on main, after integration tests pass) -------
  # Render has no GitHub OIDC trust to federate against, so deployment uses the
  # Render REST API authenticated with a Bearer API key (the RENDER_API_KEY
  # repository secret — not a user/account). This POSTs a new deploy for the
  # web service, which pulls the repo and rebuilds the Docker image
  # (see render.yaml / DEPLOY.md). The service id is not secret.
  deploy:
    name: Deploy to Render
    needs: backend-integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SERVICE_ID: srv-d8t8li5aeets73cja5e0 # snake-pass-watch web service
    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys"
